"""
Indicates that an Input Object is a OneOf Input Object (and thus requires
                        exactly one of its field be provided)
"""
directive @oneOf on INPUT_OBJECT

scalar Timestamp

"""
Holds the configuration for a plot channel.
"""
type ChannelSettingSnapshot {
  device: String!
  lineColor: Int
  markerIndex: Int
}

"""
Holds the configuration for a plot channel.
"""
input ChannelSettingSnapshotIn {
  device: String!
  lineColor: Int
  markerIndex: Int
}

"""
This structure holds information associated with a device's reading, A "reading" is the latest value of any of a device's properties.
"""
type DataInfo {
  """
  Timestamp representing when the data was sampled. This value is provided as milliseconds since 1970, UTC.
  """
  timestamp: Float!

  """
  The value of the device when sampled.
  """
  result: DataType!

  """
  The device's index (in the device database.)
  """
  di: Int!

  """
  The name of the device.
  """
  name: String!

  isoTimestamp: Timestamp!
}

"""
This structure wraps a device reading with some routing information: a `refId` to correlate which device, in the array of devices passed, this reply is for. It also has a `cycle` field so that reading from different devices can correlate which cycle they correspond.
"""
type DataReply {
  """
  This is an index to indicate which entry, in the passed array of DRF strings, this reply corresponds.
  """
  refId: Int!

  """
  The cycle number in which the device was sampled. This can be used to correlate readings from several devices.
  """
  cycle: Int!

  """
  The returned data.
  """
  data: DataInfo!
}

"""
The control system supports several types and this entity can repesent any of them.
"""
union DataType =
  | StatusReply
  | Scalar
  | ScalarArray
  | Raw
  | Text
  | TextArray
  | TimeSeries
  | StructData

input DevValue {
  intVal: Int
  scalarVal: Float
  scalarArrayVal: [Float!]
  rawVal: [Int!]
  textVal: String
  textArrayVal: [String!]
  timeSeriesVal: [TimeSeriesEntryIn!]
}

"""
Contains information about a clock event that occurred.
"""
type EventInfo {
  timestamp: Timestamp!
  event: Int!
}

"""
Queries in this section will affect the control system; updating database tables and/or controlling accelerator hardware are possible. These requests will always need to be accompanied by an authentication token and will, most-likely, be tracked and audited.
"""
type Mutation {
  """
  Sends a setting to a device.

  Not all devices can be set -- most are read-only. To be able to set a device, your SSO account must be associated with every device you may want to set.
  """
  setDevice(
    """
    The device to be set. This parameter should be expressed as a DRF entity. For instance, for ACNET devices, the device name should be appended with `.SETTING` or `.CONTROL`.
    """
    device: String!

    """
    The value of the setting.
    """
    value: DevValue!
  ): StatusReply!
  updatePlotConfiguration(config: PlotConfigurationSnapshotIn!): Int
  deletePlotConfiguration(configurationId: Int!): StatusReply!
  usersConfiguration(config: PlotConfigurationSnapshotIn!): StatusReply!
}

type PlotChannelData {
  channelUnits: String!
  channelStatus: Int!
  channelData: [PlotDataPoint!]!
}

type PlotConfigurationSnapshot {
  """
  Unique identifier for the plot configuration
  """
  configurationId: Int!
  configurationName: String!
  channels: [ChannelSettingSnapshot!]!
  xMin: Float
  xMax: Float
  yMin: Float
  yMax: Float
  timeDelta: Float
  isScalar: Boolean!
  isOneShot: Boolean!
  isShowLabels: Boolean!

  """
  If `triggerEvent` is null, this parameter specifies the delay, in milliseconds, between points in a waveform. If a trigger event is specified, then this specifies the delay after the event when the signal should be sampled. If this parameter is null, then there will be no delay after a trigger event or a 1 Hz sample rate will be used.
  """
  updateDelay: Int

  """
  The number of waveforms to return. If omitted, the service will return waveforms until the client cancels the subscription.
  """
  nAcquisitions: Int
  tclkEvent: Int
  isPersistent: Boolean!
  dataLimit: Int!
}

input PlotConfigurationSnapshotIn {
  """
  Unique identifier for the plot configuration
  """
  configurationId: Int
  configurationName: String!
  channels: [ChannelSettingSnapshotIn!]!
  xMin: Float
  xMax: Float
  yMin: Float
  yMax: Float
  timeDelta: Float
  isScalar: Boolean!
  isOneShot: Boolean!
  isShowLabels: Boolean!

  """
  If `triggerEvent` is null, this parameter specifies the delay, in milliseconds, between points in a waveform. If a trigger event is specified, then this specifies the delay after the event when the signal should be sampled. If this parameter is null, then there will be no delay after a trigger event or a 1 Hz sample rate will be used.
  """
  updateDelay: Int

  """
  The number of waveforms to return. If omitted, the service will return waveforms until the client cancels the subscription.
  """
  nAcquisitions: Int
  tclkEvent: Int
  isPersistent: Boolean!
  dataLimit: Int!
}

type PlotDataPoint {
  t: Float!
  x: Float!
  y: Float!
}

"""
Contains plot data for a given plot request.
"""
type PlotReplyData {
  """
  If the plot uses a clock for the trigger, this is the timestamp of the event.
  """
  timestamp: Float!
  """
  A unique identifier for the plot request. This identifier will be cached for a limited time. Other clients can specify it to re-use the configuration.
  """
  plotId: String!
  data: [PlotChannelData!]!
  isoTimestamp: Timestamp!
}

"""
Fields in this section return data and won't cause side-effects in the control system. Some queries may require privileges, but none will affect the accelerator.
"""
type Query {
  """
  Retrieve the next data point for the specified devices. Depending upon the event in the DRF string, the data may come back immediately or after a delay.

  *NOTE: This query hasn't been implemented yet.*
  """
  acceleratorData(
    """
    An array of device names. The returned values will be in the same order as specified in this array.
    """
    deviceList: [String!]!

    """
    Returns device values that are equal to or greater than this timestamp. If this parameter is `null`, then the current, live value is returned. NOTE: THIS FEATURE HAS NOT BEEN ADDED YET.
    """
    when: Timestamp
  ): [DataReply!]!
  plotConfiguration(configurationId: Int): [PlotConfigurationSnapshot!]!
  usersLastConfiguration(): PlotConfigurationSnapshot
}

"""
Contains the raw, unscaled data returned by a device.
"""
type Raw {
  rawValue: [Int!]!
}

"""
Represents a simple, floating point value.
"""
type Scalar {
  scalarValue: Float!
}

"""
Represents an array of floating point values.
"""
type ScalarArray {
  scalarArrayValue: [Float!]!
}

"""
Contains an ACNET status code. The Data Pool Manager currently returns these status codes, but they may go away in the future since EPICS has its own set of error codes.
"""
type StatusReply {
  status: Int!
}

type TimeSeriesEntry {
  stamp: Float!
  value: Float!
}

input TimeSeriesEntryIn {
  stamp: Float!
  value: Float!
}

type TimeSeries {
  values: [TimeSeriesEntry!]!
}

"""
Represents a generic return type. EPICS devices have a hierarchy and this return type can model those values. Note that the value associated with the key can be another `StructData`, so arbitrarily deep trees can be created.
"""
type StructData {
  key: String!
  structValue: DataType!
}

"""
This section contains requests that return a stream of results. These requests are similar to Queries in that they don't affect the state of the accelerator or any other state of the control system.
"""
type Subscription {
  """
  Retrieve data from accelerator devices.

  Accepts a list of DRF strings and streams the resulting data as it gets generated.
  """
  acceleratorData(
    """
    A array of DRF strings. Each entry of the returned stream will have a index to associate the reading with the DRF that started it.
    """
    drfs: [String!]!

    """
    The stream will return device data starting at this timestamp. If the control system cannot find data at the actual timestamp, it will return the oldest data it has that's greater then the timestamp. If this parameter is `null`, it will simply return live data. NOTE: THIS FEATURE HAS NOT BEEN ADDED YET.
    """
    startTime: Timestamp

    """
    The stream will close once the device data's timestamp reaches this value. This parameter must be greater than the `startTime` parameter. If this parameter is `null`, the stream will return live data until the client closes it. NOTE: THIS FEATURE HAS NOT BEEN ADDED YET.
    """
    endTime: Timestamp
  ): DataReply!

  """
  Retrieve correlated plot data.

  This query sets up a request which returns a stream of data, presumably used for plotting. Unlike the `acceleratorData` query, this stream returns data for all the devices in one reply. Since the data is correlated, all the devices are collected on the same event.
  """
  startPlot(
    """
    List of DRF strings that indicate the devices and return rates in which the client is interested.
    """
    drfList: [String!]!

    """
    Indicates how much data the client is able to display. If the plot generates more points than this window, the service will decimate the data set to fit. The data is first filtered by the `xMin` and `xMax` parameters before being decimated. If this parameter is `null`, all data will be returned.
    """
    windowSize: Int

    """
    The number of waveforms to return. If omitted, the service will return waveforms until the client cancels the subscription.
    """
    nAcquisitions: Int

    """
    If `triggerEvent` is null, this parameter specifies the delay, in milliseconds, between points in a waveform. If a trigger event is specified, then this specifies the delay after the event when the signal should be sampled. If this parameter is null, then there will be no delay after a trigger event or a 1 Hz sample rate will be used.
    """
    updateDelay: Int

    """
    The number of waveforms to return. If omitted, the service will return waveforms until the client cancels the subscription.
    """
    triggerEvent: Int

    """
    Minimum timestamp. All data before this timestamp will be filtered from the result set.
    """
    xMin: Float

    """
    Maximum timestamp. All data after this timestamp will be filtered from the result set.
    """
    xMax: Float
    nAcquisitions: Int
    triggerEvent: Int
  ): PlotReplyData!
  reportEvents(events: [Int!]!): EventInfo!
  calcStream(config: XformRequest!): XformResult!
}

"""
Contains a textual value returned by a device.
"""
type Text {
  textValue: String!
}

"""
Represents an array of textual values.
"""
type TextArray {
  textArrayValue: [String!]!
}

input XformAvgExpr {
  expr: XformExpr!
  n: Int!
}

input XformDeviceExpr {
  device: String!
}

input XformExpr {
  devEx: XformDeviceExpr
  avgEx: XformAvgExpr
}

input XformRequest {
  event: String!
  expr: XformExpr!
}

type XformResult {
  """
  Timestamp representing when the data was sampled. This value is provided as milliseconds since 1970, UTC.
  """
  timestamp: Timestamp!

  """
  The value of the device when sampled.
  """
  result: Scalar!
}
