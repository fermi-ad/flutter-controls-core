schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}

"""
Indicates that an Input Object is a OneOf Input Object (and thus requires exactly one of its field be provided)
"""
directive @oneOf on INPUT_OBJECT

scalar Timestamp

enum AcquisitionMode {
  ONE_SHOT
  ONE_SHOT_TRIGGERED_ON_EVENT
  REPETITIVE_PERIODIC
  REPETITIVE_TRIGGERED_ON_EVENT
  SAMPLE_ON_EVENT
}

"""
Holds the configuration for a plot channel.
"""
type ChannelSettingSnapshot {
  device: String!
  yMin: Float
  yMax: Float
  lineColor: Int
  markerIndex: Int
}

"""
Holds the configuration for a plot channel.
"""
input ChannelSettingSnapshotIn {
  device: String!
  yMin: Float
  yMax: Float
  lineColor: Int
  markerIndex: Int
}

"""
This structure holds information associated with a device's reading, A "reading" is the latest value of any of a device's properties.
"""
type DataInfo {
  """
  Timestamp representing when the data was sampled. This value is provided as seconds since 1970, UTC. The fractional portion of the value can represent nanoseconds, but we have few -- if any -- systems that provide that resolution.
  """
  timestamp: Float!

  """
  The value of the device when sampled.
  """
  result: DataType!

  """
  The timestamp as an ISO formatted string. This value is fairly expensive to generate, so the `timestamp` field should be preferred to this one. This field is mainly used for debugging or when using a tool that returns human-readable results.
  """
  isoTimestamp: Timestamp!
}

"""
This structure wraps a device's reading(s) with some routing information: a `refId` to correlate which device, in the array of devices passed, this reply is for. It also has a `cycle` field so that reading from different devices can correlate which cycle they correspond.
"""
type DataReply {
  """
  This is an index to indicate which entry, in the passed array of DRF strings, this reply corresponds.
  """
  refId: Int!

  """
  The returned data.
  """
  data: [DataInfo!]!
}

"""
The control system supports several types and this entity can repesent any of them.
"""
union DataType =
  | StatusReply
  | Scalar
  | ScalarArray
  | Raw
  | Text
  | TextArray
  | TimeSeries
  | StructData

input DevValue {
  intVal: Int
  scalarVal: Float
  scalarArrayVal: [Float!]
  rawVal: [Int!]
  textVal: String
  textArrayVal: [String!]
  timeSeriesVal: [TimeSeriesEntryIn!]
}

type Mutation {
  """
  Sends a setting to a device.

  Not all devices can be set -- most are read-only. To be able to set a device, your SSO account must be associated with every device you may want to set.
  """
  setDevice(
    """
    The device to be set. This parameter should be expressed as a DRF entity. For instance, for ACNET devices, the device name should be appended with `.SETTING` or `.CONTROL`.
    """
    device: String!

    """
    The value of the setting.
    """
    value: DevValue!
  ): StatusReply!
  updatePlotConfiguration(config: PlotConfigurationSnapshotIn!): Int
  deletePlotConfiguration(configurationId: Int!): StatusReply!

  """
  Sets the user's default configuration.

  The content of the configuration are used to set the default configuration for the user. All fields, except the ID and name fields, are used. The user's account name is obtained from the authentication token that accompanies the request.

  TEMPORARY: The `user` parameter can be used to specify the user account with which to associate the configuration. The convention is to prepend an underscore to the account name. Once we use the new authentication method, we'll be able to look-up the username and this parameter will be removed.
  """
  usersConfiguration(
    user: String
    config: PlotConfigurationSnapshotIn!
  ): StatusReply!
}

type PlotChannelData {
  """
  The engineering units of the device.
  """
  channelUnits: String!

  """
  The negotiated return rate for the data. If a device's readings are requested at a higher rate than the device can support, the front-end will negotiate down to an acheivable rate. This field represents the actual sample rate of the data.
  """
  channelRate: String!

  """
  The global status of the reading. This field will either be `0` (successful reads) or a negative status, indicating a fatal error occurred trying to get the device's data.
  """
  channelStatus: Int!

  """
  A set of data points. If the return rate is slow (<= 1Hz), this list will only have one element.
  """
  channelData: [DataInfo!]!
}

type PlotConfigurationSnapshot {
  """
  Unique identifier for the plot configuration
  """
  configurationId: Int
  configurationName: String!
  channels: [ChannelSettingSnapshot!]!
  xMin: Float
  xMax: Float
  startTime: Float
  endTime: Float
  timeDelta: Float
  isScalar: Boolean!
  isOneShot: Boolean!
  isShowLabels: Boolean!
  isPersistent: Boolean!
  isBlink: Boolean!
  acquisitionMode: AcquisitionMode
  dataLimit: Int!

  """
  If `triggerEvent` is null, this parameter specifies the delay, in milliseconds, between points in a waveform. If a trigger event is specified, then this specifies the delay after the event when the signal should be sampled. If this parameter is null, then there will be no delay after a trigger event or a 1 Hz sample rate will be used.
  """
  updateDelay: Int

  """
  The number of waveforms to return. If omitted, the service will return waveforms until the client cancels the subscription.
  """
  nAcquisitions: Int
  tclkEvent: Int
  sampleOnEvent: Int
  chXAxis: String
}

input PlotConfigurationSnapshotIn {
  """
  Unique identifier for the plot configuration
  """
  configurationId: Int
  configurationName: String!
  channels: [ChannelSettingSnapshotIn!]!
  xMin: Float
  xMax: Float
  startTime: Float
  endTime: Float
  timeDelta: Float
  isScalar: Boolean!
  isOneShot: Boolean!
  isShowLabels: Boolean!
  isPersistent: Boolean!
  isBlink: Boolean!
  acquisitionMode: AcquisitionMode
  dataLimit: Int!

  """
  If `triggerEvent` is null, this parameter specifies the delay, in milliseconds, between points in a waveform. If a trigger event is specified, then this specifies the delay after the event when the signal should be sampled. If this parameter is null, then there will be no delay after a trigger event or a 1 Hz sample rate will be used.
  """
  updateDelay: Int

  """
  The number of waveforms to return. If omitted, the service will return waveforms until the client cancels the subscription.
  """
  nAcquisitions: Int
  tclkEvent: Int
  sampleOnEvent: Int
  chXAxis: String
}

"""
Contains plot data for a given plot request.
"""
type PlotReplyData {
  """
  A unique identifier for the plot request. This identifier will be cached for a limited time. Other clients can specify it to re-use the configuration.
  """
  plotId: String!

  """
  The time of the original request.
  """
  timestamp: Float!

  """
  If requesting a triggered plot, this will be the timestamp of the last clock event (i.e. the "trigger"). All the timestamps in the data will be relative to this timestamp.
  """
  triggerTimestamp: Float

  """
  The latest set of data points for the plot. Depending on the sample rate or how much history is requested, this array will contain a chunk of data.
  """
  data: [PlotChannelData!]!
  isoTimestamp: Timestamp!
}

"""
These queries are used to access accelerator data.
"""
type Query {
  """
  Retrieve the next data point for the specified devices.

  Depending upon the event in the DRF string, the data may come back immediately or after a delay.
  """
  acceleratorData(
    """
    An array of device names. The returned values will be in the same order as specified in this array.
    """
    deviceList: [String!]!
  ): [DataReply!]!

  """
  Retrieve plot configuration(s).

  Returns a plot configuration associated with the specified ID. If the ID is `null`, all configurations are returned. Both style of requests return an array result -- it's just that specifying an ID will return an array with 0 or 1 element.
  """
  plotConfiguration(configurationId: Int): [PlotConfigurationSnapshot!]!

  """
  Obtain the user's last configuration.

  If the application saved the user's last plot configuration, this query will return it. If there is no configuration for the user, `null` is returned. The user's account is retrieved from the authentication token that is included in the request.

  TEMPORARY: The `user` parameter can be used to retrieve a user's last configuration. The convention is to prepend an underscore to the account name. Once we use the new authentication method, we'll be able to look-up the username and this parameter will be removed.
  """
  usersLastConfiguration(user: String): PlotConfigurationSnapshot

  """
  Retrieve a snapshot of the current alarms.
  """
  alarmsSnapshot: Message!
}

"""
Contains the raw, unscaled data returned by a device.
"""
type Raw {
  rawValue: [Int!]!
}

"""
Represents a simple, floating point value.
"""
type Scalar {
  scalarValue: Float!
}

"""
Represents an array of floating point values.
"""
type ScalarArray {
  scalarArrayValue: [Float!]!
}

"""
Contains an ACNET status code. The Data Pool Manager currently returns these status codes, but they may go away in the future since EPICS has its own set of error codes.
"""
type StatusReply {
  status: Int!
}

type TimeSeriesEntry {
  stamp: Float!
  value: Float!
}

input TimeSeriesEntryIn {
  stamp: Float!
  value: Float!
}

type TimeSeries {
  values: [TimeSeriesEntry!]!
}

"""
Represents a generic return type. EPICS devices have a hierarchy and this return type can model those values. Note that the value associated with the key can be another `StructData`, so arbitrarily deep trees can be created.
"""
type StructData {
  key: String!
  structValue: DataType!
}

"""
This section contains requests that return a stream of results. These requests are similar to Queries in that they don't affect the state of the accelerator or any other state of the control system.
"""
type Subscription {
  """
  Retrieve data from accelerator devices.

  Accepts a list of DRF strings and streams the resulting data. The `start_time` and `end_time` parameters determine the range in which data should be returned for the device(s). Dates in the past will retrieve data from archivers and dates in the future will return live data.
  """
  acceleratorData(
    """
    A array of DRF strings. Each entry of the returned stream will have a index to associate the reading with the DRF that started it.
    """
    drfs: [String!]!

    """
    The stream will return device data starting at this timestamp -- represented as seconds since Jan 1st, 1970 UTC. If the control system cannot find data at the actual timestamp, it will return the oldest data it has that's greater then the timestamp. If this parameter is `null`, it will simply return live data.
    """
    startTime: Float

    """
    The stream will close once the device data's timestamp reaches this value -- represented as seconds since Jan 1st, 1970 UTC. This parameter must be greater than the `startTime` parameter. If this parameter is `null`, the stream will return live data until the client closes it.
    """
    endTime: Float

    """
    If `true`, data points won't be returned if their timestamp is deemed "invalid". Right now, this test is only done on live data and the condition is that live data timestamps must be greater than the time of the request. If the `start_time` would require archived data to be included, then timestamp validation is always done.
    """
    validateTimestamp: Boolean
  ): DataReply!

  """
  Retrieve correlated plot data.

  This query sets up a request which returns a stream of data, presumably used for plotting. Unlike the `acceleratorData` query, this stream returns data for all the devices in one reply. Since the data is correlated, all the devices are collected on the same event.
  """
  startPlot(
    """
    List of DRF strings that indicate the devices and return rates in which the client is interested.
    """
    drfList: [String!]!

    """
    Indicates how much data the client is able to display. If the plot generates more points than this window, the service will decimate the data set to fit. The data is first filtered by the `xMin` and `xMax` parameters before being decimated. If this parameter is `null`, all data will be returned.
    """
    windowSize: Int

    """
    The number of waveforms to return. If omitted, the service will return waveforms until the client cancels the subscription.
    """
    nAcquisitions: Int

    """
    If `triggerEvent` is null, this parameter specifies the delay, in microseconds, between points in a waveform. If a trigger event is specified, then this specifies the delay after the event when the signal should be sampled. If this parameter is null, then there will be no delay after a trigger event or a 1 Hz sample rate will be used.
    """
    updateDelay: Int

    """
    The number of waveforms to return. If omitted, the service will return waveforms until the client cancels the subscription.
    """
    triggerEvent: Int

    """
    Minimum timestamp. DEPRECATED: This does nothing. Still in spec for backwards compatibility.
    """
    xMin: Float

    """
    Maximum timestamp. DEPRECATED: This does nothing. Still in spec for backwards compatibility.
    """
    xMax: Float
    startTime: Float
    endTime: Float
    sampleOnEvent: Int
    chXAxis: String
  ): PlotReplyData!

  """
  Stream alarms messages from ACSys.

  Takes no arguments and returns a stream of raw alarms messages. Each message
  contains information about all known alarms in a JSON-formatted string.
  """
  alarms: Message!
}

"""
Contains a textual value returned by a device.
"""
type Text {
  textValue: String!
}

"""
Represents an array of textual values.
"""
type TextArray {
  textArrayValue: [String!]!
}

"""
Represents a generic message with an optional key and required value.
"""
type Message {
  key: String
  value: String!
}
