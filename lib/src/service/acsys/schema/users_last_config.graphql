query UsersLastConfig($user: String) {
    usersLastConfiguration(user: $user) {
        configurationId
        configurationName
        channels {
            device
            lineColor
            markerIndex
        }
        xMin
        xMax
        yMin
        yMax
        startTime
        endTime
        timeDelta
        isScalar
        isOneShot
        isShowLabels
        updateDelay
        nAcquisitions
        tclkEvent
        isPersistent
        dataLimit
    }
}