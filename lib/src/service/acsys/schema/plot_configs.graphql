query PlotConfigs($id: Int) {
  plotConfiguration(configurationId: $id) {
    configurationId
    configurationName
    channels {
      device
      lineColor
      markerIndex
    }
    xMin
    xMax
    yMin
    yMax
    timeDelta
    isScalar
    isOneShot
    isShowLabels
    updateDelay
    nAcquisitions
    tclkEvent
  }
}