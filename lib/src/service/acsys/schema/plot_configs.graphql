query PlotConfigs($id: Int) {
  plotConfiguration(configurationId: $id) {
    configurationId
    configurationName
    channels {
      device
      yMin
      yMax
      lineColor
      markerIndex
    }
    xMin
    xMax
    startTime
    endTime
    timeDelta
    isScalar
    isOneShot
    isShowLabels
    updateDelay
    nAcquisitions
    tclkEvent
    isPersistent
    isBlink
    dataLimit
  }
}