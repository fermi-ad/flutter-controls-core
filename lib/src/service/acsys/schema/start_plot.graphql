subscription StartPlot($drfList: [String!]!, $xMin: Int, $xMax: Int, $windowSize: Int, $updateDelay: Int, $nAcquisitions: Int, $triggerEvent: Int) {
  startPlot(drfList: $drfList, xMin: $xMin, xMax: $xMax, windowSize: $windowSize, updateDelay: $updateDelay, nAcquisitions: $nAcquisitions, triggerEvent: $triggerEvent) {
    plotId
    data {
      channelUnits
      channelStatus
      channelData {
        x
        y
      }
    }
  }
}