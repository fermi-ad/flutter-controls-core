query ReadDevices($devList: [String!]!) {
    acceleratorData(deviceList: $devList) {
        refId
        cycle
        data {
            timestamp
            result {
                ... on StatusReply {
                    status
                }
                ... on Scalar {
                    scalarValue
                }
                ... on ScalarArray {
                    scalarArrayValue
                }
                ... on Text {
                    textValue
                }
                ... on TextArray {
                    textArrayValue
                }
            }
        }
    }
}
